name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build Corridoio
        run: npm ci && npm run build
        working-directory: corridoio
        env:
          VITE_BASE_PATH: /Claude/

      - name: Build Bue
        run: npm ci && npm run build
        working-directory: bue
        env:
          VITE_BASE_PATH: /Claude/bue/

      - name: Assemble site
        run: |
          mkdir -p _site/bue
          cp -r corridoio/dist/. _site/
          cp -r bue/dist/. _site/bue/

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
